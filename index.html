<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Gacha Circles — Genshin Impact character auto-battler with elemental VFX" />
    <title>Gacha Circles — Ayaka vs Yoimiya</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body>
    <div id="main-layout">
      <!-- Dedicated Replay Sidebar Panel -->
      <div id="replay-panel">
        <div class="dev-title" style="color: #4fc3f7;">📹 REPLAY SYSTEM</div>
        <div class="dev-subtitle">Match Recording & Loading</div>
        <div class="dev-divider" style="margin: 15px 0 10px 0;"></div>
        <div id="dev-replay-section">
          <div id="dev-replay-file-actions" class="dev-button-group" style="gap: 10px;"></div>
          <div id="dev-replay-playback-container">
            <div class="greplay-placeholder">No active playback. Complete a battle or import a replay to watch.</div>
          </div>
        </div>
      </div>

      <!-- Developer Controls Sidebar Panel -->
      <div id="dev-panel">
        <div class="dev-title">🛠️ DEV CONTROLS</div>
        <div class="dev-subtitle">Battle Simulation Panel</div>
        <div class="dev-divider"></div>
        <div class="dev-button-group">
          <button id="dev-btn-restart" class="dev-btn dev-btn--restart">RESTART</button>
          <button id="dev-btn-rematch" class="dev-btn dev-btn--rematch" disabled>REMATCH</button>
        </div>
      </div>

      <!-- Telemetry Feed Sidebar Panel -->
      <div id="telemetry-panel">
        <div class="dev-title" style="color: #ffd54f;">📊 REPLAY TELEMETRY</div>
        <div class="dev-subtitle">Real-Time Process Analyzer</div>
        <div class="dev-divider" style="margin: 15px 0 10px 0;"></div>
        <div id="telemetry-content">
          <div class="telemetry-empty">Awaiting Replay Playback...</div>
        </div>
      </div>
      
      <div id="game-container">
        <div id="game-canvas-wrapper"></div>
        <div id="hud-overlay"></div>
        <div id="damage-layer"></div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
